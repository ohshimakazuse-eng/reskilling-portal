services:
  - type: web
    name: reskilling-portal
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
      - key: FORCE_HTTPS
        value: "true"
      - key: PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
